<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UltraTube Grid Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#050505;
    --card:#111111;
    --card2:#171717;
    --border:rgba(255,255,255,.08);
    --text:#ffffff;
    --text2:#9d9d9d;
    --accent:#ff2f6d;
    --accent2:#7b61ff;
    --green:#22c55e;
    --danger:#ff4444;
    --shadow:0 0 30px rgba(255,47,109,.18);
}

body{
    background:
        radial-gradient(circle at top left,#1a0027 0%,transparent 35%),
        radial-gradient(circle at bottom right,#001a3d 0%,transparent 30%),
        #050505;
    color:var(--text);
    font-family:Inter,Segoe UI,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
}

/* animated bg */

.bg-lines{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:-1;
}

.bg-lines span{
    position:absolute;
    width:1px;
    height:220px;
    background:linear-gradient(transparent,rgba(255,255,255,.12),transparent);
    animation:move 8s linear infinite;
}

@keyframes move{
    0%{
        transform:translateY(-200px);
        opacity:0;
    }
    30%{
        opacity:1;
    }
    100%{
        transform:translateY(120vh);
        opacity:0;
    }
}

.header{
    position:sticky;
    top:0;
    z-index:1000;
    backdrop-filter:blur(14px);
    background:rgba(5,5,5,.75);
    border-bottom:1px solid var(--border);
    padding:18px;
}

.top-row{
    display:flex;
    align-items:center;
    gap:18px;
    flex-wrap:wrap;
}

.logo{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:260px;
}

.logo-box{
    width:56px;
    height:56px;
    border-radius:18px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    box-shadow:var(--shadow);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

.logo h1{
    font-size:24px;
    font-weight:800;
}

.logo p{
    color:var(--text2);
    font-size:12px;
}

.input-area{
    flex:1;
    display:flex;
    gap:10px;
    min-width:300px;
}

.input-wrap{
    position:relative;
    flex:1;
}

.url-input{
    width:100%;
    height:58px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);
    border-radius:18px;
    padding:0 18px 0 55px;
    color:#fff;
    font-size:15px;
    outline:none;
    transition:.25s;
}

.url-input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(255,47,109,.12);
}

.input-icon{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:var(--accent);
    font-size:22px;
}

.btn{
    border:none;
    cursor:pointer;
    transition:.2s;
    white-space:nowrap;
}

.btn:active{
    transform:scale(.95);
}

.btn-main{
    height:58px;
    min-width:150px;
    padding:0 22px;
    border-radius:18px;
    color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    font-size:15px;
    font-weight:700;
    box-shadow:var(--shadow);
}

.btn-main:hover{
    filter:brightness(1.1);
}

.toolbar{
    margin-top:16px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
}

.tool-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:12px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
}

.tool-label{
    color:var(--text2);
    font-size:12px;
    margin-right:5px;
}

.grid-btn{
    width:38px;
    height:38px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.08);
    background:#1a1a1a;
    color:#fff;
    cursor:pointer;
    transition:.2s;
}

.grid-btn:hover{
    background:#222;
}

.grid-btn.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
}

.side-layout{
    display:grid;
    grid-template-columns:320px 1fr;
    gap:20px;
    padding:20px;
}

.sidebar{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.side-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:20px;
    backdrop-filter:blur(14px);
}

.side-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
}

.side-title h2{
    font-size:18px;
}

.session-input{
    width:100%;
    height:50px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#1b1b1b;
    color:#fff;
    padding:0 16px;
    margin-bottom:12px;
}

.action-row{
    display:flex;
    gap:10px;
}

.small-btn{
    flex:1;
    height:46px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:#1d1d1d;
    color:#fff;
    transition:.2s;
}

.small-btn:hover{
    background:#292929;
}

.sessions-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:300px;
    overflow:auto;
    padding-right:4px;
}

.session-item{
    background:#191919;
    border:1px solid rgba(255,255,255,.06);
    border-radius:16px;
    padding:14px;
    cursor:pointer;
    transition:.2s;
    animation:fadeIn .3s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.session-item:hover{
    border-color:var(--accent);
    transform:translateY(-2px);
}

.session-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.session-name{
    font-weight:700;
}

.session-meta{
    margin-top:6px;
    font-size:12px;
    color:var(--text2);
}

.delete-session{
    width:28px;
    height:28px;
    border-radius:10px;
    border:none;
    background:#2a1111;
    color:#ff6666;
    cursor:pointer;
}

.watch-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.watch-card{
    background:#171717;
    border-radius:18px;
    padding:16px;
}

.watch-card span{
    color:var(--text2);
    font-size:12px;
    display:block;
    margin-bottom:8px;
}

.watch-card strong{
    font-size:22px;
}

.progress{
    width:100%;
    height:22px;
    background:#1b1b1b;
    border-radius:999px;
    overflow:hidden;
    margin-top:16px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:.5s;
}

.main{
    min-width:0;
}

.video-grid{
    display:grid;
    gap:14px;
}

.video-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    overflow:hidden;
    backdrop-filter:blur(10px);
    animation:cardIn .35s ease;
}

@keyframes cardIn{
    from{
        opacity:0;
        transform:scale(.94);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.player-wrap{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
}

.player-wrap div{
    position:absolute;
    inset:0;
}

.video-footer{
    padding:16px;
}

.video-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
}

.video-label{
    font-size:14px;
    font-weight:700;
}

.video-watch{
    margin-top:10px;
    color:var(--text2);
    font-size:12px;
}

.remove-btn{
    width:40px;
    height:40px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    background:#2b1111;
    color:#ff7777;
    transition:.2s;
}

.remove-btn:hover{
    transform:scale(1.08);
}

.empty{
    padding:120px 20px;
    text-align:center;
    color:var(--text2);
}

.empty i{
    font-size:72px;
    margin-bottom:16px;
    display:block;
    color:var(--accent);
}

.ping{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:999;
    background:rgba(0,0,0,.7);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(14px);
    border-radius:999px;
    padding:12px 18px;
    display:flex;
    align-items:center;
    gap:10px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#555;
}

.dot.live{
    background:var(--green);
    box-shadow:0 0 10px var(--green);
}

@media(max-width:1100px){
    .side-layout{
        grid-template-columns:1fr;
    }
}

@media(max-width:700px){
    .input-area{
        flex-direction:column;
    }

    .btn-main{
        width:100%;
    }

    .watch-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="bg-lines" id="bgLines"></div>

<header class="header">

<div class="top-row">

<div class="logo">
<div class="logo-box">
<i class="ti ti-brand-youtube"></i>
</div>
<div>
<h1>UltraTube Grid Pro</h1>
<p>Persistent YouTube session viewer</p>
</div>
</div>

<div class="input-area">

<div class="input-wrap">
<i class="ti ti-link input-icon"></i>
<input
type="text"
class="url-input"
id="urlInput"
placeholder="Paste YouTube URL once and keep adding videos..."
>
</div>

<button class="btn btn-main" onclick="addVideo()">
<i class="ti ti-plus"></i>
Add Video
</button>

</div>

</div>

<div class="toolbar">

<div class="tool-box">
<div class="tool-label">Columns</div>

<button class="grid-btn active" data-cols="1">1</button>
<button class="grid-btn" data-cols="2">2</button>
<button class="grid-btn" data-cols="3">3</button>
<button class="grid-btn" data-cols="4">4</button>
<button class="grid-btn" data-cols="5">5</button>
<button class="grid-btn" data-cols="6">6</button>
<button class="grid-btn" data-cols="8">8</button>
<button class="grid-btn" data-cols="10">10</button>
<button class="grid-btn" data-cols="12">12</button>
<button class="grid-btn" data-cols="15">15</button>
<button class="grid-btn" data-cols="20">20</button>

</div>

<div class="tool-box">
<button class="small-btn" onclick="addDemoVideos()">
<i class="ti ti-sparkles"></i>
Demo
</button>

<button class="small-btn" onclick="clearAll()">
<i class="ti ti-trash"></i>
Clear
</button>
</div>

</div>

</header>

<div class="side-layout">

<div class="sidebar">

<div class="side-card">

<div class="side-title">
<h2>Sessions</h2>
<i class="ti ti-device-floppy"></i>
</div>

<input
type="text"
id="sessionName"
class="session-input"
placeholder="session-name"
>

<div class="action-row">
<button class="small-btn" onclick="saveSession()">
Save
</button>

<button class="small-btn" onclick="loadSession()">
Load
</button>
</div>

<div style="height:14px"></div>

<div class="sessions-list" id="sessionsList"></div>

</div>

<div class="side-card">

<div class="side-title">
<h2>Watchtime</h2>
<i class="ti ti-chart-bar"></i>
</div>

<div style="margin-bottom:14px">
<input
type="number"
id="targetHours"
class="session-input"
value="3000"
placeholder="Target hours"
>
</div>

<div class="watch-grid">

<div class="watch-card">
<span>Total Watched</span>
<strong id="watchedTime">0h 0m 0s</strong>
</div>

<div class="watch-card">
<span>Completion</span>
<strong id="completion">0%</strong>
</div>

<div class="watch-card">
<span>Remaining</span>
<strong id="remaining">0h</strong>
</div>

<div class="watch-card">
<span>Players</span>
<strong id="playersCount">0</strong>
</div>

</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>

</div>

<div class="main">

<div class="video-grid" id="videoGrid">

<div class="empty">
<i class="ti ti-device-tv"></i>
<h2>No videos added</h2>
<div style="margin-top:8px">
Paste YouTube URL once and keep adding players
</div>
</div>

</div>

</div>

</div>

<div class="ping">
<div class="dot" id="pingDot"></div>
<div id="pingText">Server connecting...</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let videos = [];
let cols = 1;
let players = [];
let ytReady = false;
let totalWatchSeconds = Number(localStorage.getItem("ultratube_watchtime") || 0);

const grid = document.getElementById("videoGrid");

function createLines(){
    const bg = document.getElementById("bgLines");

    for(let i=0;i<40;i++){
        const s = document.createElement("span");

        s.style.left = Math.random()*100+"vw";
        s.style.animationDelay = Math.random()*8+"s";
        s.style.opacity = Math.random();

        bg.appendChild(s);
    }
}

createLines();

function extractVideoId(url){

    if(!url) return null;

    url = url.trim();

    const patterns = [
        /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
        /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
        /^([a-zA-Z0-9_-]{11})$/
    ];

    for(const p of patterns){
        const match = url.match(p);

        if(match) return match[1];
    }

    return null;
}

function formatTime(sec){

    sec = Math.floor(sec);

    const h = Math.floor(sec/3600);
    const m = Math.floor((sec%3600)/60);
    const s = sec%60;

    return `${h}h ${m}m ${s}s`;
}

function render(){

    if(!videos.length){

        grid.innerHTML = `
        <div class="empty">
            <i class="ti ti-device-tv"></i>
            <h2>No videos added</h2>
            <div style="margin-top:8px">
                Paste YouTube URL once and keep adding players
            </div>
        </div>
        `;

        return;
    }

    grid.style.gridTemplateColumns = `repeat(${cols},minmax(0,1fr))`;

    grid.innerHTML = videos.map((v,i)=>`
    
    <div class="video-card">

        <div class="player-wrap">
            <div id="player-${i}"></div>
        </div>

        <div class="video-footer">

            <div class="video-row">

                <div class="video-label">
                    Video ${i+1}
                </div>

                <button class="remove-btn" onclick="removeVideo(${i})">
                    <i class="ti ti-trash"></i>
                </button>

            </div>

            <div class="video-watch">
                Auto loop • Auto play • Muted autoplay enabled
            </div>

        </div>

    </div>

    `).join("");

    if(ytReady){
        setTimeout(initPlayers,250);
    }
}

function addVideo(){

    const input = document.getElementById("urlInput");

    const url = input.value;

    const id = extractVideoId(url);

    if(!id){

        input.style.borderColor = "#ff4444";

        setTimeout(()=>{
            input.style.borderColor = "";
        },700);

        return;
    }

    videos.push({
        id:id
    });

    render();

    updateWatch();

    /* INPUT DOES NOT CLEAR */
}

function removeVideo(i){

    videos.splice(i,1);

    render();

    updateWatch();
}

function clearAll(){

    if(confirm("Clear all videos?")){

        videos = [];

        render();

        updateWatch();
    }
}

function initPlayers(){

    players.forEach(p=>{
        try{
            p.destroy();
        }catch(e){}
    });

    players = [];

    videos.forEach((video,i)=>{

        const player = new YT.Player(`player-${i}`,{

            videoId:video.id,

            playerVars:{
                autoplay:1,
                mute:1,
                controls:1,
                loop:1,
                playlist:video.id,
                rel:0,
                playsinline:1
            },

            events:{

                onReady:(e)=>{

                    try{
                        e.target.mute();

                        const duration = e.target.getDuration();

                        if(duration > 60){

                            const randomStart = Math.floor(Math.random()*(duration-30));

                            e.target.seekTo(randomStart);
                        }

                        e.target.playVideo();

                    }catch(err){}
                },

                onStateChange:(e)=>{

                    if(e.data === YT.PlayerState.ENDED){

                        try{
                            e.target.playVideo();
                        }catch(err){}
                    }
                }
            }
        });

        players.push(player);
    });
}

window.onYouTubeIframeAPIReady = function(){

    ytReady = true;

    render();

    initPlayers();
};

function updateWatch(){

    const targetHours = Number(document.getElementById("targetHours").value || 3000);

    const targetSeconds = targetHours * 3600;

    const percent = Math.min((totalWatchSeconds/targetSeconds)*100,100);

    const remain = Math.max(targetSeconds-totalWatchSeconds,0);

    document.getElementById("watchedTime").innerText = formatTime(totalWatchSeconds);

    document.getElementById("completion").innerText = percent.toFixed(2)+"%";

    document.getElementById("remaining").innerText = formatTime(remain);

    document.getElementById("playersCount").innerText = players.length;

    document.getElementById("progressBar").style.width = percent+"%";
}

setInterval(()=>{

    let playing = 0;

    players.forEach(player=>{

        try{

            if(player.getPlayerState() === 1){
                playing++;
            }

        }catch(e){}
    });

    if(playing > 0){

        totalWatchSeconds += playing;

        localStorage.setItem("ultratube_watchtime",totalWatchSeconds);
    }

    updateWatch();

},1000);

function saveSession(){

    const name = document.getElementById("sessionName").value.trim();

    if(!name) return;

    localStorage.setItem("ultratube_session_"+name,JSON.stringify({

        videos,
        cols,
        totalWatchSeconds

    }));

    refreshSessions();
}

function loadSession(){

    const name = document.getElementById("sessionName").value.trim();

    if(!name) return;

    const raw = localStorage.getItem("ultratube_session_"+name);

    if(!raw) return;

    const data = JSON.parse(raw);

    videos = data.videos || [];

    cols = data.cols || 1;

    totalWatchSeconds = data.totalWatchSeconds || 0;

    setGridButtons();

    render();

    updateWatch();
}

function refreshSessions(){

    const list = document.getElementById("sessionsList");

    const keys = Object.keys(localStorage)
    .filter(k=>k.startsWith("ultratube_session_"));

    if(!keys.length){

        list.innerHTML = `
        <div style="color:#777;font-size:13px">
            No saved sessions
        </div>
        `;

        return;
    }

    list.innerHTML = keys.map(key=>{

        const name = key.replace("ultratube_session_","");

        const data = JSON.parse(localStorage.getItem(key));

        return `
        <div class="session-item">

            <div class="session-top">

                <div class="session-name">
                    ${name}
                </div>

                <button class="delete-session"
                onclick="deleteSession(event,'${name}')">
                    <i class="ti ti-trash"></i>
                </button>

            </div>

            <div class="session-meta">
                ${data.videos.length} videos • ${data.cols} cols
            </div>

            <div style="height:10px"></div>

            <button class="small-btn"
            onclick="quickLoad('${name}')">
                Load Session
            </button>

        </div>
        `;

    }).join("");
}

function deleteSession(event,name){

    event.stopPropagation();

    localStorage.removeItem("ultratube_session_"+name);

    refreshSessions();
}

function quickLoad(name){

    document.getElementById("sessionName").value = name;

    loadSession();
}

function setGridButtons(){

    document.querySelectorAll(".grid-btn").forEach(btn=>{

        btn.classList.remove("active");

        if(Number(btn.dataset.cols) === cols){

            btn.classList.add("active");
        }
    });

    render();
}

document.querySelectorAll(".grid-btn").forEach(btn=>{

    btn.addEventListener("click",()=>{

        cols = Number(btn.dataset.cols);

        setGridButtons();
    });
});

function addDemoVideos(){

    const demo = [
        "jNQXAC9IVRw",
        "dQw4w9WgXcQ",
        "9bZkp7q19f0",
        "kffacxfA7G4"
    ];

    demo.forEach(id=>{

        videos.push({id});
    });

    render();
}

document.getElementById("urlInput").addEventListener("keydown",e=>{

    if(e.key === "Enter"){

        addVideo();
    }
});

document.getElementById("targetHours")
.addEventListener("input",updateWatch);

function ping(){

    const dot = document.getElementById("pingDot");

    const txt = document.getElementById("pingText");

    fetch("/ping")
    .then(r=>r.json())
    .then(d=>{

        dot.classList.add("live");

        txt.innerText = "Server Alive";

        setTimeout(()=>{
            dot.classList.remove("live");
        },3000);

    })
    .catch(()=>{

        txt.innerText = "Ping failed";
    });
}

setInterval(ping,5*60*1000);

refreshSessions();

updateWatch();

render();
</script>

</body>
</html>
