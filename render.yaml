services:
  - type: web
    name: youtube-video-grid
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: youtube-video-grid
          property: host
